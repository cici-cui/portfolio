<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>冰箱管家</title>
  <style>
    :root{--p:#4CAF82;--s:#FF8C42;--bg:#F8F5F0;--card:#fff;--t:#333;--m:#888;--danger:#FF5252;--warn:#FFB300;--shadow:0 10px 25px rgba(0,0,0,.08);--r:20px;--nav:72px;--safe:env(safe-area-inset-bottom);--font:"Nunito","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    [data-theme="dark"]{--bg:#121212;--card:#1E1E1E;--t:#EDEDED;--m:#A0A0A0;--shadow:0 10px 25px rgba(0,0,0,.35)}
    *{box-sizing:border-box} html,body{height:100%} body{margin:0;background:radial-gradient(1200px 800px at 10% -10%,#fff 0%,var(--bg) 55%);color:var(--t);font-family:var(--font)}
    .app{max-width:480px;margin:0 auto;min-height:100%;padding-bottom:calc(var(--nav) + var(--safe));animation:fadeIn .5s}
    .frame{max-width:520px;margin:24px auto;padding:12px;border-radius:34px;background:linear-gradient(145deg,#f1f1f1,#fff);box-shadow:0 20px 40px rgba(0,0,0,.12)}
    @media(max-width:560px){.frame{padding:0;background:transparent;box-shadow:none;margin:0}}
    .page{padding:18px 16px 8px;display:none;animation:fadeIn .35s} .page.active{display:block}
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px;transition:transform .18s ease, box-shadow .18s ease}
    .card.float:hover{transform:translateY(-4px);transition:.18s}
    .card:active{transform:translateY(1px)}
    .row{display:flex;gap:10px;align-items:center} .space{justify-content:space-between}
    .pill{padding:4px 10px;border-radius:999px;background:#eaf7f1;color:var(--p);font-size:12px;font-weight:700}
    .btn{border:0;background:var(--p);color:#fff;padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer;min-height:44px;transition:transform .12s,box-shadow .2s;box-shadow:0 6px 16px rgba(76,175,130,.35)}
    .btn.secondary{background:var(--s);box-shadow:0 6px 16px rgba(255,140,66,.35)}
    .btn.ghost{background:transparent;color:var(--t);border:1px dashed rgba(0,0,0,.15);box-shadow:none}
    .btn:active{transform:scale(.97)}
    .title{font-size:18px;font-weight:800} .sec{font-size:15px;font-weight:800;margin:4px 0 10px}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(480px,100%);height:calc(var(--nav) + var(--safe));background:var(--card);box-shadow:0 -10px 25px rgba(0,0,0,.08);border-radius:20px 20px 0 0;display:grid;grid-template-columns:repeat(5,1fr);align-items:center;padding-bottom:var(--safe);z-index:20}
    .nav .tab{text-align:center;font-size:12px;color:var(--m);cursor:pointer;min-height:64px;display:flex;align-items:center;justify-content:center;position:relative} 
    .nav .tab.active{color:var(--p);font-weight:800}
    .nav .tab.pressed{transform:scale(.96)}
    .nav .tab::after{content:"";position:absolute;bottom:8px;left:50%;width:6px;height:6px;border-radius:50%;background:var(--p);transform:translateX(-50%) scale(0);transition:.2s}
    .nav .tab.active::after{transform:translateX(-50%) scale(1)}
    .nav .plus{margin-top:-28px} .nav .plus .btn{width:58px;height:58px;border-radius:50%;padding:0;font-size:24px}
    .welcome{background:linear-gradient(135deg,#6ed3a6,var(--p));color:#fff} .welcome .pill{background:rgba(255,255,255,.2);color:#fff}
    .stat{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .stat .card{text-align:center;padding:10px 6px;border-radius:16px;background:#f1fbf6;font-weight:800}
    .progress{height:8px;background:#f0f0f0;border-radius:999px;overflow:hidden} .progress span{display:block;height:100%;background:var(--p)}
    .scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
    .recipe{min-width:160px;background:var(--card);border-radius:18px;padding:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s ease}
    .recipe:active{transform:scale(.98)}
    .tabs{display:flex;gap:10px;overflow-x:auto;margin-bottom:10px}
    .tab-pill{white-space:nowrap;padding:8px 12px;border-radius:999px;background:#f1f1f1;font-size:12px;cursor:pointer;min-height:44px;display:inline-flex;align-items:center}
    .tab-pill.active{background:var(--p);color:#fff;font-weight:800}
    .grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media(max-width:420px){.grid2{grid-template-columns:repeat(2,1fr)}}
    .food{background:var(--card);border-radius:16px;padding:8px;box-shadow:var(--shadow);position:relative;min-height:96px;transition:transform .18s ease}
    .food:active{transform:scale(.98)}
    .food .emoji{font-size:26px;text-align:center} .food .name{font-weight:800;font-size:14px;text-align:center}
    .tag{font-size:10px;padding:2px 6px;border-radius:999px;display:inline-block}
    .tag.ok{background:#e7f7ee;color:#2e8b57} .tag.warn{background:#fff2d6;color:#c47d00;animation:blink 1.2s infinite} .tag.bad{background:#ffe0e0;color:#c0392b}
    .acts{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:.6}
    .icon{border:1px solid #e6e6e6;background:transparent;border-radius:6px;padding:2px 4px;cursor:pointer;min-height:22px;font-size:11px;color:var(--m)}
    #soonList .row{font-size:12px}
    .search{display:flex;gap:8px;margin-bottom:10px} .search input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #e3e3e3;font-size:14px;min-height:44px;background:var(--card);color:var(--t)}
    .empty{text-align:center;padding:30px 10px;color:var(--m)} .empty .emoji{font-size:40px}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:10px} .form .full{grid-column:1/-1}
    .form label{font-size:12px;color:var(--m);display:block;margin:4px 0 6px}
    .form input,.form select,.form textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e2e2e2;font-size:14px;min-height:44px;background:var(--card);color:var(--t)}
    .upload{border:2px dashed #d8d8d8;border-radius:16px;padding:16px;text-align:center;color:var(--m)}
    .preview{width:100%;border-radius:16px;margin-top:10px}
    .subtabs{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
    .sub{padding:8px 12px;border-radius:999px;background:#f1f1f1;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;white-space:nowrap}
    .sub.active{background:var(--p);color:#fff;font-weight:800}
    .line{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:var(--card);box-shadow:var(--shadow);margin-bottom:8px;cursor:pointer;transition:transform .18s ease}
    .line:active{transform:scale(.99)}
    .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:11px}
    .cell{background:var(--card);border-radius:10px;padding:6px;min-height:54px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s ease}
    .cell:active{transform:scale(.98)}
    .lib .card{display:flex;gap:10px;align-items:center}
    .lib-emoji{width:64px;height:64px;border-radius:16px;background:#fff3e6;display:flex;align-items:center;justify-content:center;font-size:26px}
    .toast{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--t);padding:10px 16px;border-radius:999px;box-shadow:var(--shadow);z-index:30;transition:top .3s}
    .toast.show{top:20px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(6px);display:none;z-index:40}
    .modal.active{display:block}
    .panel{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:24px 24px 0 0;padding:16px;max-height:92%;overflow-y:auto;animation:up .3s}
    .module{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:10px;margin-bottom:10px}
    .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .info-chip{background:#f1fbf6;border-radius:12px;padding:8px 10px;font-size:12px;font-weight:700}
    [data-theme="dark"] .info-chip{background:#1b2a25}
    .fridge-layout{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .fridge-layout.haier{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(6,60px);gap:8px}
    .fridge-cell{border:2px dashed #e2e2e2;border-radius:14px;padding:10px;min-height:70px;position:relative;background:linear-gradient(180deg,#ffffff,#f7faf8)}
    .fridge-cell.fridge{grid-column:1 / span 2;grid-row:1 / span 2}
    .fridge-cell.fresh{grid-column:1 / span 2;grid-row:3 / span 1}
    .fridge-cell.drawers{grid-column:1 / span 2;grid-row:4 / span 1}
    .fridge-cell.freezer{grid-column:1 / span 2;grid-row:5 / span 2}
    .fridge-cell .label{font-weight:800}
    .fridge-cell .count{position:absolute;right:10px;top:10px;font-size:12px;color:var(--m)}
    .fridge-cell .mini{font-size:22px}
    [data-theme="dark"] .fridge-cell{background:linear-gradient(180deg,#1b1f1e,#171a19);border-color:#2a2a2a}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .kpi .card{padding:10px}
    .kpi .value{font-weight:800;font-size:16px}
    .plan-list{display:flex;flex-direction:column;gap:8px}
    .plan-item{background:#f7faf8;border-radius:12px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:grab}
    .plan-item.dragging{opacity:.5}
    .handle{font-size:16px}
    .plan-item .remove{margin-left:auto;border:0;background:#eee;border-radius:8px;padding:4px 8px;cursor:pointer}
    [data-theme="dark"] .plan-item{background:#1b2421}
    canvas{width:100%;height:120px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}} @keyframes fadeIn{from{opacity:0}to{opacity:1}} @keyframes up{from{transform:translateY(40px)}to{transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="frame">
    <div id="app" class="app" data-theme="light">
      <section class="page active" data-page="home">
        <div class="card welcome">
          <div class="row space">
            <div>
              <div id="greeting" class="title">早上好☀️ 小厨师</div>
              <div id="today" class="muted">2026-03-03</div>
            </div>
            <div class="pill" id="goalPill">均衡营养</div>
          </div>
        </div>
        <div class="stat">
          <div class="card"><div>食材总数</div><div id="statTotal">0</div></div>
          <div class="card"><div>⚠️临期数量</div><div id="statSoon">0</div></div>
          <div class="card"><div>今日可做</div><div id="statCook">0</div></div>
        </div>
        <div class="card float">
          <div class="sec">冰箱迷你预览</div>
          <div id="miniFridge"></div>
        </div>
        <div class="card">
          <div class="sec">今日推荐食谱</div>
          <div id="todayRecipes"></div>
        </div>
        <div class="card" id="soonListCard" style="display:none;">
          <div class="sec">临期提醒</div>
          <div id="soonList"></div>
        </div>
      </section>

      <section class="page" data-page="fridge">
        <div class="row space">
          <div class="title">冰箱库存</div>
          <button class="btn secondary" id="clearExpiredBtn">清理过期</button>
        </div>
        <div class="search"><input id="searchInput" placeholder="🔍 搜索食材" /></div>
        <div class="tabs" id="zoneTabs"></div>
        <div class="tabs" id="categoryTabs"></div>
        <div id="fridgeList"></div>
      </section>

      <section class="page" data-page="manage">
        <div class="title">管理食材</div>
        <div class="subtabs" id="manageTabs"></div>
        <div id="manageContent"></div>
      </section>

      <section class="page" data-page="recipes">
        <div class="title">食谱中心</div>
        <div class="subtabs" id="recipeTabs"></div>
        <div id="recipeContent"></div>
      </section>

      <section class="page" data-page="me">
        <div id="meContent"></div>
      </section>
    </div>
  </div>

  <nav class="nav">
    <div class="tab active" data-target="home">首页</div>
    <div class="tab" data-target="fridge">冰箱</div>
    <div class="tab plus" data-target="manage"><button class="btn">➕</button></div>
    <div class="tab" data-target="recipes">食谱</div>
    <div class="tab" data-target="me">我的</div>
  </nav>

  <div id="toast" class="toast">提示</div>

  <div id="recipeModal" class="modal">
    <div class="panel">
      <div class="row space">
        <div id="modalTitle" class="title">🍳 食谱</div>
        <div>
          <button class="btn ghost" id="modalFavBtn">❤️</button>
          <button class="btn ghost" id="modalClose">✕</button>
        </div>
      </div>
      <div id="modalMeta" class="muted" style="margin:6px 0 10px;"></div>
      <div id="modalInfo"></div>
      <div class="sec">食材清单</div>
      <div id="modalIngredients"></div>
      <div class="sec">烹饪步骤</div>
      <div id="modalSteps"></div>
      <div id="modalMissing"></div>
      <div class="row space" style="margin-top:12px;">
        <button class="btn ghost" id="addShoppingBtn">加入购物清单</button>
        <button class="btn secondary" id="markCookedBtn">✅标记已做</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="panel">
      <div class="title">确认操作</div>
      <div id="confirmText" class="muted" style="margin:10px 0 16px;">确定要执行吗？</div>
      <div class="row space">
        <button class="btn ghost" id="confirmCancel">取消</button>
        <button class="btn secondary" id="confirmOk">确认</button>
      </div>
    </div>
  </div>

    function drawRing(){
      const canvas=$("#calorieRing");if(!canvas) return;const ctx=canvas.getContext("2d");
      const goal=state.user.goal.includes("减脂")?1500:state.user.goal.includes("增肌")?2200:1800;
      const planned=getToday().reduce((s,r)=>s+r.totalCalories,0);const ratio=Math.min(1,planned/goal);
      const w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=40;
      ctx.clearRect(0,0,w,h);ctx.lineWidth=12;ctx.strokeStyle="#eee";ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle="rgba(76,175,130,.9)";ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*ratio);ctx.stroke();
      ctx.fillStyle=getComputedStyle(document.body).color;ctx.font="14px Nunito";ctx.textAlign="center";ctx.fillText(`${planned} / ${goal} kcal`,cx,cy+5);
    }
    function mealDishCount(){
      const p=Math.max(1,Number(state.user.people)||1);
      if(p===1) return 3; // 荤素汤，主食固定
      if(p<=3) return 4;
      if(p<=5) return 5;
      return 6;
    }
    function generateTodayPlan(){
      const b=[getTop("早餐",1)[0]].filter(Boolean);
      const count=mealDishCount();
      const pickList=(meal)=>{
        const pool=recipesDB.filter(r=>r.mealType.includes(meal));
        const used=new Set();
        const meat=pool.filter(r=>r.ingredients.some(i=>["猪肉","牛肉","鸡胸肉","鱼","虾"].includes(i.name)));
        const veg=pool.filter(r=>r.ingredients.some(i=>["番茄","黄瓜","西兰花","土豆","菠菜","胡萝卜"].includes(i.name)));
        const soup=pool.filter(r=>r.category==="汤类");
        const staple=pool.filter(r=>r.category==="主食"||r.name.includes("米饭")||r.name.includes("面"));
        const pick=(arr)=>{const c=arr[Math.floor(Math.random()*arr.length)];if(c) used.add(c.name);return c};
        const res=[pick(staple),pick(meat),pick(veg),pick(soup)].filter(Boolean);
        while(res.length<count){const r=pool[Math.floor(Math.random()*pool.length)];if(r && !used.has(r.name)){used.add(r.name);res.push(r)}}
        return res;
      };
      const l=pickList("午餐");
      const d=pickList("晚餐");
      const snack=state.user.showSnack?getTop("下午茶",1):[];
      state.todayPlan={早餐:b,午餐:l,晚餐:d,下午茶:snack};
      saveState();
      renderToday();
      toast("已生成今日菜单");
    }

    function renderWeek(){

    function autoWeek(){
      const days=["一","二","三","四","五","六","日"];const used=new Set();
      for(const d of days){
        const b=recipesDB.filter(r=>r.mealType.includes("早餐"));state.weeklyPlan[`周${d}早`]=pickUnique(b,used);
        const l=recipesDB.filter(r=>r.mealType.includes("午餐"));state.weeklyPlan[`周${d}中`]=pickUnique(l,used);
        const dn=recipesDB.filter(r=>r.mealType.includes("晚餐"));state.weeklyPlan[`周${d}晚`]=pickUnique(dn,used);
      }
      saveState();renderWeek();toast("本周菜单已生成");
    }
    function pickUnique(list,used){let c;for(let i=0;i<list.length;i++){const r=list[Math.floor(Math.random()*list.length)];if(!used.has(r.name)){c=r;used.add(r.name);break}}return c||list[0]}

      $$("#libraryCats .tab-pill").forEach(el=>el.onclick=()=>{$$("#libraryCats .tab-pill").forEach(x=>x.classList.remove("active"));el.classList.add("active");active=el.dataset.c;render()});
      $$("#libraryCats .tab-pill")[0].classList.add("active");render();
    }

    function renderMe(){
      const avatars=["👩‍🍳","👨‍🍳","🦊","🐼","🐰","🐯","🐸","🦁"];
      $("#meContent").innerHTML=`<div class="card welcome"><div class="row space">
        <div class="row"><div style="font-size:36px;cursor:pointer" id="avatarPick">${state.user.avatar}</div>
          <div style="margin-left:10px"><div class="title" id="editName">${state.user.name}</div><div class="pill" id="editGoal">${state.user.goal}</div></div></div>
        <div class="muted">${state.fridge.length}种食材</div></div>
        <div class="row space" style="margin-top:10px;"><div>❤️收藏 ${state.favorites.length}</div><div>🍳已做 ${state.cookedLog.length}</div></div></div>
        <div class="card"><div class="sec">数据看板</div>
          <div class="kpi">
            <div class="card"><div class="muted">新增食材</div><div class="value">${sum(state.dataLog,"added")} 种</div></div>
            <div class="card"><div class="muted">过期丢弃</div><div class="value">${sum(state.dataLog,"wasted")} 种</div></div>
            <div class="card"><div class="muted">已烹饪</div><div class="value">${sum(state.dataLog,"cooked")} 道</div></div>
            <div class="card"><div class="muted">平均热量</div><div class="value">${Math.round(avg(state.dataLog,"calories"))} kcal</div></div>
          </div>
          <div class="row space muted" style="margin-top:8px;"><span>本周新增趋势</span><span>单位：种/天</span></div><canvas id="chartAdd" width="300" height="120"></canvas>
          <div class="row space muted"><span>过期丢弃趋势</span><span>单位：种/天</span></div><canvas id="chartWaste" width="300" height="120"></canvas>
          <div class="row space muted"><span>热量趋势</span><span>单位：kcal/天</span></div><canvas id="chartCal" width="300" height="120"></canvas></div>
        <div class="card"><div class="sec">冰箱收纳布局</div>
          <div class="row space" style="margin-bottom:8px;">
            <div class="muted">当前：${state.user.fridgeLayout}</div>
            <select id="layoutSelect">
              ${["单门冰箱","法式三门冰箱","十字冰箱","海尔413法式双开门"].map(l=>`<option ${state.user.fridgeLayout===l?"selected":""}>${l}</option>`).join("")}
            </select>
          </div>
          <div class="fridge-layout" id="fridgeLayoutGrid"></div>
        </div>
        <div class="card"><div class="sec">家庭冰箱</div><div id="familyBlock"></div></div>
        <div class="card"><div class="sec">❤️我的收藏</div><div class="scroll">${state.favorites.map(n=>{const r=recipesDB.find(x=>x.name===n);return r?recipeCard(r):""}).join("")||"<div class='muted'>暂无收藏</div>"}</div></div>
        <div class="card"><div class="sec">⚙️设置</div>
          <div class="row space"><div>过期提醒天数</div><input id="remindRange" type="range" min="1" max="14" value="${state.user.remindDays}" /><div>${state.user.remindDays}天</div></div>
          <div class="row space" style="margin-top:10px;"><div>用餐人数</div><input id="peopleRange" type="range" min="1" max="6" value="${state.user.people}" /><div>${state.user.people}人</div></div>
          <div class="row space" style="margin-top:10px;"><div>显示下午茶</div><input id="snackToggle" type="checkbox" ${state.user.showSnack?"checked":""} /></div>
          <div class="row space" style="margin-top:10px;"><div>深色模式</div><input id="darkToggle" type="checkbox" ${state.user.darkMode?"checked":""} /></div></div>`;
      renderFamily(); $$("#meContent .recipe").forEach(el=>el.onclick=()=>openRecipe(el.dataset.recipe));
      $("#avatarPick").onclick=()=>{const pick=avatars[(avatars.indexOf(state.user.avatar)+1)%avatars.length];state.user.avatar=pick;saveState();renderMe()};
      $("#editName").onclick=()=>{const n=prompt("昵称",state.user.name);if(n){state.user.name=n;saveState();renderMe();renderHome()}};
      $("#editGoal").onclick=()=>{const g=prompt("健康目标：均衡营养/减脂控卡/增肌补蛋白/清淡饮食/儿童营养/老年健康",state.user.goal);if(g){state.user.goal=g;saveState();renderAll()}};
      $("#remindRange").oninput=e=>{state.user.remindDays=Number(e.target.value);saveState();renderAll()};
      $("#peopleRange").oninput=e=>{state.user.people=Number(e.target.value);saveState();renderToday();renderMe()};
      $("#snackToggle").onchange=e=>{state.user.showSnack=e.target.checked;saveState();renderHome();renderToday();};
      renderFridgeLayout();
      $$("#layoutSelect").forEach(el=>el.onchange=()=>{state.user.fridgeLayout=el.value;saveState();renderMe();});
      $("#darkToggle").onchange=e=>{state.user.darkMode=e.target.checked;applyTheme();saveState()};
      drawCharts();
    }
    function renderFamily(){
      const wrap=$("#familyBlock");const fam=state.family;
      if(!fam){wrap.innerHTML=`<div class="row space"><button class="btn ghost" id="createFamily">创建家庭组</button><button class="btn secondary" id="joinFamily">加入家庭组</button></div>`;
        $("#createFamily").onclick=()=>{const name=prompt("家庭名");if(name){state.family={name,code:Math.random().toString(36).slice(2,8).toUpperCase(),members:[state.user.avatar]};saveState();renderFamily()}};
        $("#joinFamily").onclick=()=>{const code=prompt("邀请码");if(code){state.family={name:"好友的厨房",code,members:[state.user.avatar,"🐰","🐼"]};saveState();renderFamily()}}}
      else{wrap.innerHTML=`<div class="row space"><div><strong>${fam.name}</strong></div><button class="btn ghost" id="inviteFamily">邀请成员</button></div>
        <div class="row" style="margin-top:8px;">${fam.members.map(m=>`<div style="font-size:26px;">${m}</div>`).join("")}</div>`;$("#inviteFamily").onclick=()=>alert(`邀请码：${fam.code}`)}
    }
    function drawCharts(){drawBar($("#chartAdd"),state.dataLog.map(d=>d.added),"#4CAF82");drawBar($("#chartWaste"),state.dataLog.map(d=>d.wasted),"#FF8C42");drawLine($("#chartCal"),state.dataLog.map(d=>d.calories),"#4CAF82")}
    function drawBar(canvas,data,color){if(!canvas) return;const ctx=canvas.getContext("2d");const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);const max=Math.max(...data,1);const bw=w/data.length-6;
      data.forEach((v,i)=>{const x=i*(bw+6)+3;const bh=(v/max)*(h-20);ctx.fillStyle=color;ctx.fillRect(x,h-bh-6,bw,bh)})}
    function drawLine(canvas,data,color){if(!canvas) return;const ctx=canvas.getContext("2d");const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);const max=Math.max(...data,1);
      ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();data.forEach((v,i)=>{const x=i*(w/(data.length-1));const y=h-(v/max)*(h-20)-10;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
      ctx.setLineDash([6,4]);ctx.strokeStyle="#999";ctx.beginPath();ctx.moveTo(0,h/2);ctx.lineTo(w,h/2);ctx.stroke();ctx.setLineDash([])}

    function renderFridgeLayout(){
      const layout=state.user.fridgeLayout;
      const grid=$("#fridgeLayoutGrid");
      grid.className="fridge-layout"+(layout==="海尔413法式双开门"?" haier":"");
      if(layout==="海尔413法式双开门"){
        const cold=state.fridge.filter(f=>f.zone==="冷藏").length;
        const fresh=state.fridge.filter(f=>f.zone==="蔬果格").length;
        const freezer=state.fridge.filter(f=>f.zone==="冷冻").length;
        const door=state.fridge.filter(f=>f.zone==="门架").length;
        grid.innerHTML=`
          <div class="fridge-cell fridge" data-zone="冷藏">
            <div class="label">🧊 上部双开冷藏</div><div class="count">${cold}项</div>
            <div class="mini">冷藏 · 宽门仓</div><div class="progress" style="margin-top:6px;"><span style="width:${Math.min(100,cold*10)}%"></span></div>
          </div>
          <div class="fridge-cell fresh" data-zone="蔬果格">
            <div class="label">🥗 中部保鲜抽屉</div><div class="count">${fresh}项</div>
            <div class="mini">果蔬保湿</div><div class="progress" style="margin-top:6px;"><span style="width:${Math.min(100,fresh*15)}%"></span></div>
          </div>
          <div class="fridge-cell drawers" data-zone="门架">
            <div class="label">🚪 门体储物</div><div class="count">${door}项</div>
            <div class="mini">调味/饮料</div><div class="progress" style="margin-top:6px;"><span style="width:${Math.min(100,door*20)}%"></span></div>
          </div>
          <div class="fridge-cell freezer" data-zone="冷冻">
            <div class="label">❄️ 下部大抽屉冷冻</div><div class="count">${freezer}项</div>
            <div class="mini">深冷分储</div><div class="progress" style="margin-top:6px;"><span style="width:${Math.min(100,freezer*12)}%"></span></div>
          </div>`;
      } else {
        const map={
          "单门冰箱":["冷藏","冷冻","蔬果格","门架"],
          "法式三门冰箱":["冷藏","冷藏","蔬果格","冷冻","门架","门架"],
          "十字冰箱":["冷藏","冷藏","蔬果格","蔬果格","冷冻","冷冻","门架","门架"]
        };
        const zones=map[layout]||map["单门冰箱"];
        grid.innerHTML=zones.map(z=>{
          const items=state.fridge.filter(f=>f.zone===z);
          const pct=Math.min(100,items.length*20);
          const icon=z==="冷藏"?"❄️":z==="冷冻"?"🧊":z==="蔬果格"?"🥗":"🚪";
          return `<div class="fridge-cell" data-zone="${z}">
            <div class="label">${icon} ${z}</div>
            <div class="count">${items.length}项</div>
            <div class="mini">容量 ${pct}%</div>
            <div class="progress" style="margin-top:6px;"><span style="width:${pct}%"></span></div>
          </div>`;
        }).join("");
      }
      $$(".fridge-cell").forEach(el=>el.onclick=()=>{go("fridge");activeZone=el.dataset.zone;renderFridge();});
    }

    function bindPlanDrag(){
      let dragEl=null;
      $$(".plan-item").forEach(el=>{
        el.addEventListener("dragstart",()=>{dragEl=el;el.classList.add("dragging")});
        el.addEventListener("dragend",()=>{el.classList.remove("dragging");dragEl=null});
      });
      $$(".plan-list").forEach(list=>{
        list.addEventListener("dragover",(e)=>{
          e.preventDefault();
          const afterElement=getDragAfterElement(list,e.clientY);
          if(!dragEl) return;
          if(afterElement==null) list.appendChild(dragEl); else list.insertBefore(dragEl,afterElement);
        });
        list.addEventListener("drop",()=>{
          const meal=list.dataset.meal;
          const names=[...list.querySelectorAll(".plan-item")].map(i=>i.dataset.name);
          state.todayPlan[meal]=names.map(n=>recipesDB.find(r=>r.name===n)).filter(Boolean);
          saveState();
        });
      });
      function getDragAfterElement(container,y){
        const els=[...container.querySelectorAll(".plan-item:not(.dragging)")];
        return els.reduce((closest,child)=>{
          const box=child.getBoundingClientRect();
          const offset=y - box.top - box.height/2;
          if(offset<0 && offset>closest.offset) return {offset,element:child};
          return closest;
        },{offset:Number.NEGATIVE_INFINITY}).element;
      }
    }

    function openRecipe(name){
      const r=recipesDB.find(x=>x.name===name);if(!r) return;$("#recipeModal").classList.add("active");
      $("#modalTitle").textContent=`${r.emoji} ${r.name}`;const fav=state.favorites.includes(r.name);$("#modalFavBtn").textContent=fav?"💖":"🤍";
      $("#modalMeta").textContent=`${r.category} · ${r.mealType.join("/")}`;
      $("#modalInfo").innerHTML=`<div class="module"><div class="sec">基础信息</div>
        <div class="info-grid">
          <div class="info-chip">⏱ ${r.time} 分钟</div>
          <div class="info-chip">👥 ${r.servings} 人份</div>
          <div class="info-chip">⭐ ${r.difficulty}</div>
          <div class="info-chip">🔥 ${r.totalCalories} kcal</div>
        </div>
      </div>
      <div class="module"><div class="sec">营养标签</div>
        <div class="row" style="gap:6px;flex-wrap:wrap">
          <div class="pill">${r.caloriesLevel}</div>
          ${r.healthTags.map(t=>`<div class="pill">${t}</div>`).join("")}
        </div>
      </div>`;
      const names=state.fridge.map(f=>f.name);
      $("#modalIngredients").innerHTML=r.ingredients.map(i=>{const has=names.includes(i.name);return `<div>${has?"✅":"❌"} ${i.name} ${i.amount}${i.unit} ${has?"（冰箱已有）":"（冰箱缺少）"}</div>`}).join("");
      $("#modalSteps").innerHTML=r.steps.map((s,i)=>`<div>${i+1}. ${s}</div>`).join("");
      const missing=r.ingredients.filter(i=>!names.includes(i.name)).map(i=>i.name);$("#modalMissing").innerHTML=missing.length?`<div class="module">还差：${missing.join("、")}</div>`:"";
      $("#modalFavBtn").onclick=()=>{state.favorites=fav?state.favorites.filter(x=>x!==r.name):state.favorites.concat(r.name);saveState();openRecipe(r.name);renderMe()};
      $("#addShoppingBtn").onclick=()=>toast("已加入购物清单");
      $("#markCookedBtn").onclick=()=>{state.cookedLog.push({name:r.name,date:todayStr()});saveState();toast("已记录为今日已做");renderMe()};
      $("#modalFavBtn").style.display="inline-flex";$("#addShoppingBtn").style.display="inline-flex";$("#markCookedBtn").style.display="inline-flex";
    }
    function openFoodModal(id){
      const f=state.fridge.find(x=>x.id===id);if(!f) return;
      $("#recipeModal").classList.add("active");
      $("#modalTitle").textContent=`${f.emoji||"🍽️"} ${f.name}`;
      $("#modalMeta").textContent=`${f.category} · ${f.zone}`;
      const left=daysLeft(f.expire);
      $("#modalInfo").innerHTML=`<div class="module"><div class="sec">食材信息</div>
        <div class="info-grid">
          <div class="info-chip">数量：${f.qty}${f.unit}</div>
          <div class="info-chip">热量：${f.calories||0} kcal</div>
          <div class="info-chip">过期：${f.expire}</div>
          <div class="info-chip">${left<0?"已过期":`还剩 ${left} 天`}</div>
        </div>
      </div>${f.note?`<div class="module"><div class="sec">备注</div><div class="muted">${f.note}</div></div>`:""}`;
      $("#modalIngredients").innerHTML="";
      $("#modalSteps").innerHTML="";
      $("#modalMissing").innerHTML="";
      $("#modalFavBtn").style.display="none";
      $("#addShoppingBtn").style.display="none";
      $("#markCookedBtn").style.display="none";
    }
    $("#modalClose").onclick=()=>$("#recipeModal").classList.remove("active");
    $("#recipeModal").addEventListener("click",e=>{if(e.target.id==="recipeModal") $("#recipeModal").classList.remove("active")});
    function openModal(html){$("#recipeModal").classList.add("active");$("#modalTitle").textContent="🍱 购物清单";$("#modalMeta").textContent="";
      $("#modalInfo").innerHTML="";$("#modalIngredients").innerHTML=html;$("#modalSteps").innerHTML="";$("#modalMissing").innerHTML="";
      $("#modalFavBtn").style.display="none";$("#addShoppingBtn").style.display="none";$("#markCookedBtn").style.display="none";}

    function go(name){
      $$(".page").forEach(p=>p.classList.remove("active"));$(`.page[data-page="${name}"]`).classList.add("active");
      $$(".nav .tab").forEach(t=>t.classList.remove("active"));$(`.nav .tab[data-target="${name}"]`).classList.add("active");
      if(name==="home") renderHome(); if(name==="fridge") renderFridge(); if(name==="manage") renderManage(); if(name==="recipes") renderRecipes(); if(name==="me") renderMe();
    }
    $$(".nav .tab").forEach(t=>t.addEventListener("click",()=>{t.classList.add("pressed");setTimeout(()=>t.classList.remove("pressed"),180);go(t.dataset.target);}));
    function applyTheme(){ $("#app").setAttribute("data-theme", state.user.darkMode?"dark":"light"); }
    function renderAll(){renderHome();renderFridge();renderManage();renderRecipes();renderMe();}
    function guessEmoji(name){if(name.includes("蛋"))return"🥚";if(name.includes("番茄"))return"🍅";if(name.includes("土豆"))return"🥔";if(name.includes("黄瓜"))return"🥒";if(name.includes("西兰花"))return"🥦";if(name.includes("肉"))return"🥩";if(name.includes("鱼"))return"🐟";if(name.includes("虾"))return"🦐";if(name.includes("牛奶"))return"🥛";return"🍽️";}
    const shuffle=a=>a.sort(()=>Math.random()-.5);const sum=(l,k)=>l.reduce((s,i)=>s+i[k],0);const avg=(l,k)=>sum(l,k)/l.length;

    applyTheme();renderAll();
  </script>
